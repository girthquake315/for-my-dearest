<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for ramona</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: Arial, sans-serif;
            background: #fcd7de; /* Soft, clean pink background */
            color: #333333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Large focal Mason Jar shape */
        .jar-container {
            cursor: pointer;
            width: 100%;
            max-width: 380px;
            height: 540px;
            background: #ffffff;
            border: 4px solid #333333;
            /* Curving the bottom and creating slight shoulders for a true mason jar look */
            border-radius: 40px 40px 80px 80px; 
            position: relative;
            padding: 40px 20px 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Mason Jar Neck */
        .jar-container::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 12px;
            background: #ffffff;
            border-left: 4px solid #333333;
            border-right: 4px solid #333333;
            border-top: 4px solid #333333;
            z-index: 1;
        }

        /* Mason Jar Lid Threads */
        .jar-container::after {
            content: '';
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            width: 190px;
            height: 12px;
            background: #ffffff;
            border: 4px solid #333333;
            border-radius: 6px 6px 0 0;
            z-index: 2;
        }

        .jar-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Polaroid style image frame - uncropped */
        .couple-photo {
            width: 95%;
            height: 280px;
            object-fit: contain;
            border: 1px solid #eeeeee;
            padding: 6px;
            background: #ffffff;
            margin-bottom: 20px;
            display: none; 
        }

        .note-text {
            font-size: 1.1rem;
            line-height: 1.5;
            padding: 0 10px;
            color: #222222;
        }

        .click-hint {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #555555; /* Darkened slightly to read easily over the pink background */
        }
    </style>
</head>
<body>

    <div class="jar-container" onclick="drawNote()">
        <div class="jar-content">
            <img id="photoDisplay" class="couple-photo" src="" alt="us">
            <div id="textDisplay" class="note-text">
                tap the jar
            </div>
        </div>
    </div>

    <div class="click-hint">click anywhere on the jar to change it</div>

    <script>
        const generalPhotos = ["./pic1.png", "./pic2.png", "./pic3.png", "./pic4.png"];

        const standardNotes = [
            "i truly think you're the prettiest girl in the world",
            "you're such an easy person to love",
            "ever since the day i met you, you've been on my mind almost every minute of the day",
            "you have the cutest smile i've ever seen",
            "i love being around you because you let me be my true self",
            "when im with you nothing ever feels boring",
            "you're my favorite person to talk to about everything in the world",
            "embarassing but i still get butterflies when im about to see you",
            "i love the way we stare into eachothers eyes",
            "you coming into my life was genuinely a miracle",
            "i love you so much",
            "i like to think that you've changed me forever, in a good way",
            "you make me wanna be a better me",
            "whenever im sad you're always the first person i go to",
            "i value you more than anything else",
            "everynight when we call, i feel more loved than i ever have before",
            "you make me feel loved in a way i've never felt before",
            "before dating you i thought i was incapable of love but you proved me wrong",
            "i love every aspect of you",
            "i love your hair",
            "you're the prettiest girl in the world",
            "you're the sweetest girl in the world",
            "im willing to sacrifice whatever's necessary for us to succeed",
            "you're the only person i never get tired of talking to",
            "even when we dont have anything to talk about, just being in your presence makes me feel safe",
            "not to sound cringy but when i have a bad day i always have you to look forward to",
            "you're the most comfort i've ever felt in another person",
            "i think about you and i genuinely just feel so incredibly lucky",
            "i never have to pretend to be someone else when i'm with you",
            "i want to protect you and take care of you forever",
            "you've had my whole heart since the very start",
            "you're my safe place ramona"
        ];

        const rareNoteText = "i can see myself marrying you someday ramona";
        const rareNoteImage = "./pic5.png";

        let lastIndex = -1;

        function drawNote() {
            const textDisplay = document.getElementById('textDisplay');
            const photoDisplay = document.getElementById('photoDisplay');
            
            let selectedText = "";
            let selectedImage = "";

            if (Math.random() < 0.10) {
                selectedText = rareNoteText;
                selectedImage = rareNoteImage;
            } else {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * standardNotes.length);
                } while (randomIndex === lastIndex && standardNotes.length > 1);
                
                lastIndex = randomIndex;
                selectedText = standardNotes[randomIndex];
                
                const randomPhotoIndex = Math.floor(Math.random() * generalPhotos.length);
                selectedImage = generalPhotos[randomPhotoIndex];
            }

            textDisplay.innerText = selectedText;
            photoDisplay.src = selectedImage;
            photoDisplay.style.display = "block";
        }
    </script>
</body>
</html>
