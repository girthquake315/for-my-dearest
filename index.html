<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Jar of Smiles</title>
    <style>
        /* Base Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fdf6f6; /* Soft, warm background */
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #d17a7a;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #8c8c8c;
            margin-bottom: 30px;
        }

        /* The Jar Container & Animation */
        .jar-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .jar-container:hover {
            transform: scale(1.05);
        }

        /* Pure CSS Mason Jar */
        .jar {
            width: 140px;
            height: 200px;
            background: rgba(255, 255, 255, 0.6);
            border: 4px solid #b5d5d5;
            border-radius: 20px 20px 40px 40px;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }

        /* Jar Lid */
        .jar::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 15px;
            background: #e0adad;
            border-radius: 5px 5px 0 0;
            border: 4px solid #ca9494;
            border-bottom: none;
        }

        /* Little Tag on the Jar */
        .jar-tag {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fffdf6;
            border: 2px dashed #ca9494;
            padding: 8px 12px;
            font-size: 0.85rem;
            color: #ca9494;
            font-weight: bold;
            border-radius: 4px;
            white-space: nowrap;
        }

        /* The Compliment Box */
        .compliment-box {
            margin-top: 30px;
            min-height: 80px;
            max-width: 400px;
            width: 100%;
            padding: 20px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .compliment-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Hint text */
        .hint {
            font-size: 0.85rem;
            color: #b5b5b5;
            margin-top: 10px;
        }

        /* Shaking animation when clicked */
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-5px, 0) rotate(-5deg); }
            40% { transform: translate(5px, 0) rotate(5deg); }
            60% { transform: translate(-5px, 0) rotate(-5deg); }
            80% { transform: translate(5px, 0) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shake {
            animation: shake 0.4s ease;
        }
    </style>
</head>
<body>

    <h1>A Jar Full of Reasons</h1>
    <p class="subtitle">Click the jar whenever you need a reminder.</p>

    <!-- The interactive Jar -->
    <div class="jar-container" id="jarContainer" onclick="drawCompliment()">
        <div class="jar">
            <div class="jar-tag">Open Me ♥</div>
        </div>
    </div>
    
    <p class="hint">Tap to reach inside</p>

    <!-- Where the compliment pops up -->
    <div class="compliment-box" id="complimentBox">
        Click the jar to pull out a note!
    </div>

    <script>
        // --- ADD YOUR CUSTOM COMPLIMENTS HERE ---
        const compliments = [
            "Your laugh is literally my favorite sound in the world.",
            "You are so incredibly resilient, and I admire your strength every day.",
            "Just thinking about you makes my hardest days so much easier.",
            "I love the specific way your eyes light up when you're excited about something.",
            "You make the world a softer, kinder place just by being in it.",
            "You are my favorite person to do absolutely nothing with.",
            "I'm so incredibly proud of you and everything you do.",
            "You have the most beautiful heart I've ever known."
        ];

        let lastIndex = -1;

        function drawCompliment() {
            const jar = document.getElementById('jarContainer');
            const box = document.getElementById('complimentBox');
            
            // Add the shaking effect
            jar.classList.add('shake');
            
            // Remove the shake class after animation finishes so it can be re-triggered
            setTimeout(() => {
                jar.classList.remove('shake');
            }, 400);

            // Hide the box slightly for a smooth fade-in transition
            box.classList.remove('show');

            setTimeout(() => {
                // Pick a random compliment (ensuring it doesn't repeat the exact same one twice in a row)
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * compliments.length);
                } while (randomIndex === lastIndex && compliments.length > 1);
                
                lastIndex = randomIndex;
                
                // Display the new compliment
                box.innerText = compliments[randomIndex];
                box.classList.add('show');
            }, 200);
        }
    </script>
</body>
</html>
