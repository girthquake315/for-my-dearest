<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for ramona</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: Arial, sans-serif;
            background: #fafafa;
            color: #333333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Large, focal minimalist jar */
        .jar-container {
            cursor: pointer;
            width: 100%;
            max-width: 380px;
            height: 520px;
            background: #ffffff;
            border: 3px solid #333333;
            border-radius: 30px 30px 60px 60px;
            position: relative;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .jar-container::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 15px;
            background: #ffffff;
            border: 3px solid #333333;
            border-radius: 8px 8px 0 0;
        }

        .jar-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Simple polaroid style image frame */
        .couple-photo {
            width: 95%;
            max-height: 260px;
            object-fit: cover;
            border: 1px solid #eeeeee;
            padding: 6px;
            background: #ffffff;
            margin-bottom: 25px;
            display: none; /* Hidden until clicked */
        }

        .note-text {
            font-size: 1.1rem;
            line-height: 1.5;
            padding: 0 10px;
            color: #222222;
        }

        .click-hint {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #888888;
        }
    </style>
</head>
<body>

    <div class="jar-container" onclick="drawNote()">
        <div class="jar-content">
            <img id="photoDisplay" class="couple-photo" src="" alt="us">
            <div id="textDisplay" class="note-text">
                tap the jar
            </div>
        </div>
    </div>

    <div class="click-hint">click anywhere on the jar to change it</div>

    <script>
        // Core notes matched up with file names we will upload
        const standardNotes = [
            {
                text: "i truly think you're the prettiest girl in the world",
                image: "pic1.png"
            },
            {
                text: "you're such an easy person to love",
                image: "pic2.png"
            },
            {
                text: "ever since the day i met you, you've been on my mind almost every minute of the day",
                image: "pic3.png"
            },
            {
                text: "i truly think you're the prettiest girl in the world",
                image: "pic4.png"
            }
        ];

        // The rare note matched up with your suit/formal picture
        const rareNote = {
            text: "i can see myself marrying you someday ramona",
            image: "pic5.png"
        };

        let lastIndex = -1;

        function drawNote() {
            const textDisplay = document.getElementById('textDisplay');
            const photoDisplay = document.getElementById('photoDisplay');
            
            let selectedNote;

            // 10% chance for the rare marriage note, 90% for standard notes
            if (Math.random() < 0.10) {
                selectedNote = rareNote;
            } else {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * standardNotes.length);
                } while (randomIndex === lastIndex && standardNotes.length > 1);
                
                lastIndex = randomIndex;
                selectedNote = standardNotes[randomIndex];
            }

            // Zero transitions, clean instant text and picture swap
            textDisplay.innerText = selectedNote.text;
            photoDisplay.src = selectedNote.image;
            photoDisplay.style.display = "block";
        }
    </script>
</body>
</html>
